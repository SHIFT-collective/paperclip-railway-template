name: Bump Paperclip upstream

on:
  schedule:
    # Mondays at 09:00 UTC.
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Read current Paperclip ref
        id: current
        run: |
          ref=$(grep -E '^ARG PAPERCLIP_REF=' Dockerfile | sed 's/^ARG PAPERCLIP_REF=//')
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Run bump script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/bump-paperclip-ref.mjs

      - name: Read new Paperclip ref
        id: next
        run: |
          ref=$(grep -E '^ARG PAPERCLIP_REF=' Dockerfile | sed 's/^ARG PAPERCLIP_REF=//')
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Open PR if changed
        if: steps.current.outputs.ref != steps.next.outputs.ref
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/bump-paperclip-${{ steps.next.outputs.ref }}
          base: main
          title: "chore: bump Paperclip to ${{ steps.next.outputs.ref }}"
          commit-message: "chore: bump Paperclip ${{ steps.current.outputs.ref }} -> ${{ steps.next.outputs.ref }}"
          body: |
            Bumps upstream Paperclip from `${{ steps.current.outputs.ref }}` to `${{ steps.next.outputs.ref }}`.

            - Release notes: https://github.com/paperclipai/paperclip/releases/tag/${{ steps.next.outputs.ref }}
            - Compare: https://github.com/paperclipai/paperclip/compare/${{ steps.current.outputs.ref }}...${{ steps.next.outputs.ref }}

            Review the upstream release notes for migration/config changes (e.g. new Postgres extensions, env vars) and update `TEMPLATE_CHANGELOG.md` before merging.

            Auto-generated by `.github/workflows/bump-paperclip.yml`.
          labels: |
            dependencies
            paperclip
