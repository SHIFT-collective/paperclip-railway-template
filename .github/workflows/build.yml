name: Build image

# Verifies the Docker image actually builds — i.e. that the downstream patches in
# patches/ still apply against the pinned upstream Paperclip ref and that the
# pnpm build succeeds. This is the gate that makes the weekly bump PRs safe to
# merge on green (the bump workflow only edits the ref; it never builds).

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Paperclip ref
        id: ref
        run: |
          ref=$(grep -E '^ARG PAPERCLIP_REF=' Dockerfile | sed 's/^ARG PAPERCLIP_REF=//')
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "Building against upstream Paperclip $ref"

      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune -af || true
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (verifies patches apply against ${{ steps.ref.outputs.ref }})
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
